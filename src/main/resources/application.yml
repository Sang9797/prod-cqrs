spring:
  application:
    name: cqrs-order-service

  # ── Virtual Threads (Java 25 / Project Loom) ──────────────────────
  threads:
    virtual:
      enabled: true

  # ── JPA ───────────────────────────────────────────────────────────
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  # ── Liquibase ─────────────────────────────────────────────────────
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # ── GraphQL ───────────────────────────────────────────────────────
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true

# ── JWT ───────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${APP_JWT_SECRET:c2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1ub3QtZm9yLXByb2R1Y3Rpb24=}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

# ── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json

# ── Actuator ──────────────────────────────────────────────────────
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ── OpenAPI ───────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ── Logging ───────────────────────────────────────────────────────
# Pattern and appenders are configured in logback-spring.xml
logging:
  level:
    com.company.orders: INFO
    org.hibernate.SQL: WARN

# ── Graceful shutdown ─────────────────────────────────────────────
spring.lifecycle.timeout-per-shutdown-phase: 30s
