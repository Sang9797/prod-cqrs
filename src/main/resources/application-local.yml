spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  liquibase:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    # Fine-grained overrides — base levels live in logback-spring.xml <springProfile name="local">
    org.hibernate.orm.jdbc.bind: TRACE
