# Tuned for the CQRS order service in a Docker container

listen_addresses = '*'          # allow connections from Docker bridge network (PgBouncer)
password_encryption = md5       # required for PgBouncer md5 auth (scram-sha-256 not supported with hashed userlist)
max_connections = 100           # PgBouncer keeps actual connections low
shared_buffers = 64MB
effective_cache_size = 192MB
maintenance_work_mem = 16MB
checkpoint_completion_target = 0.9
wal_buffers = 4MB
default_statistics_target = 100
random_page_cost = 1.1          # for SSD
effective_io_concurrency = 200  # for SSD
work_mem = 2MB
min_wal_size = 80MB
max_wal_size = 1GB
log_min_duration_statement = 500   # log queries > 500ms
log_checkpoints = on
log_lock_waits = on
