# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix socket — always trust (used by local pg_isready healthcheck)
local   all             all                                     trust

# IPv4/IPv6 localhost — trust (local tooling, pg_isready from host via port 5432)
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Replication
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust

# Docker bridge network — md5 matches password_encryption setting in postgresql.conf.
# PgBouncer stores credentials as md5 hashes in userlist.txt; scram-sha-256 requires
# the plaintext password on the pooler side which is not production-safe.
host    all             all             all                     md5
