global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cqrs-order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']             # Docker full-stack (make docker-up)
        labels:
          env: 'docker'
      - targets: ['host.docker.internal:8080']  # local app (make docker-up-infra + make run)
        labels:
          env: 'local'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.*):\d+'
        replacement: '${1}'
